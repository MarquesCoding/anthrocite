name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-26
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: xcodebuild -version

      - name: Build (Release, ad-hoc signed)
        run: |
          set -o pipefail
          xcodebuild \
            -project ClaudeTracker.xcodeproj \
            -scheme ClaudeTracker \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Verify code signature
        run: |
          APP="build/Build/Products/Release/Anthrocite.app"
          codesign -dv --verbose=2 "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Package (zip)
        run: ditto -c -k --keepParent "build/Build/Products/Release/Anthrocite.app" "Anthrocite.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: Anthrocite-app
          path: apps/macos/Anthrocite.zip
          if-no-files-found: error

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
